workflows:
  ios-app-store:
    name: NM Dress Hatay iOS App Store
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      groups:
        - ios_credentials
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.nmdresshatay.app
      vars:
        XCODE_WORKSPACE: "ios/Runner.xcworkspace"
        XCODE_SCHEME: "Runner"
      flutter: stable
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Flutter version
        script: flutter --version
      - name: Get Flutter packages
        script: flutter pub get
      - name: Check GoogleService-Info.plist
        script: |
          ls ios/Runner/GoogleService-Info.plist || {
            echo "GoogleService-Info.plist not found!"
            exit 1
          }
      - name: Fix iOS deployment target
        script: |
          sed -i '' \
            's/IPHONEOS_DEPLOYMENT_TARGET = 13\.0/IPHONEOS_DEPLOYMENT_TARGET = 14.0/g' \
            ios/Runner.xcodeproj/project.pbxproj
          echo "Deployment targets after fix:"
          grep "IPHONEOS_DEPLOYMENT_TARGET" ios/Runner.xcodeproj/project.pbxproj
      - name: Pod install
        script: |
          cd ios
          pod install --repo-update
      - name: Flutter build iOS release
        script: |
          flutter build ios \
            --release \
            --no-codesign \
            --build-name=1.0.0 \
            --build-number=$BUILD_NUMBER
      - name: Xcode archive and export IPA
        script: |
          xcode-project use-profiles
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
      - name: Upload to TestFlight
        script: |
          echo "$APP_STORE_CONNECT_PRIVATE_KEY" > /tmp/authkey.p8
          app-store-connect publish \
            --path $(find build/ios/ipa -name "*.ipa") \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --private-key @file:/tmp/authkey.p8
          rm /tmp/authkey.p8
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
      email:
        recipients:
          - mertsanverdi98@gmail.com
        notify:
          success: true
          failure: true
