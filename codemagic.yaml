workflows:
  ios-app-store:
    name: NM Dress Hatay iOS App Store
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      groups:
        - ios_credentials
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.nmdresshatay.app
      vars:
        XCODE_WORKSPACE: "ios/Runner.xcworkspace"
        XCODE_SCHEME: "Runner"
        APP_VERSION: "1.0.0"
        TEAM_ID: "54S6D6TXJ6"
      flutter: stable
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Flutter version
        script: flutter --version

      - name: Get Flutter packages
        script: flutter pub get

      - name: Check GoogleService-Info.plist
        script: |
          ls ios/Runner/GoogleService-Info.plist || {
            echo "GoogleService-Info.plist not found!"
            exit 1
          }

      - name: Fix iOS deployment target
        script: |
          sed -i '' \
            's/IPHONEOS_DEPLOYMENT_TARGET = 13\.0/IPHONEOS_DEPLOYMENT_TARGET = 16.0/g' \
            ios/Runner.xcodeproj/project.pbxproj
          sed -i '' \
            's/IPHONEOS_DEPLOYMENT_TARGET = 14\.0/IPHONEOS_DEPLOYMENT_TARGET = 16.0/g' \
            ios/Runner.xcodeproj/project.pbxproj
          sed -i '' \
            's/IPHONEOS_DEPLOYMENT_TARGET = 12\.0/IPHONEOS_DEPLOYMENT_TARGET = 16.0/g' \
            ios/Runner.xcodeproj/project.pbxproj
          echo "Deployment targets after fix:"
          grep "IPHONEOS_DEPLOYMENT_TARGET" ios/Runner.xcodeproj/project.pbxproj | sort -u

      - name: Inject Apple Team ID into project.pbxproj
        script: |
          if grep -q "DEVELOPMENT_TEAM" ios/Runner.xcodeproj/project.pbxproj; then
            sed -i '' \
              "s/DEVELOPMENT_TEAM = [A-Z0-9]*/DEVELOPMENT_TEAM = $TEAM_ID/g" \
              ios/Runner.xcodeproj/project.pbxproj
          else
            sed -i '' \
              "s/PRODUCT_BUNDLE_IDENTIFIER/DEVELOPMENT_TEAM = $TEAM_ID;\n\t\t\t\tPRODUCT_BUNDLE_IDENTIFIER/g" \
              ios/Runner.xcodeproj/project.pbxproj
          fi
          echo "Team ID after injection:"
          grep "DEVELOPMENT_TEAM" ios/Runner.xcodeproj/project.pbxproj | sort -u

      - name: Pod install
        script: |
          cd ios
          pod install --repo-update

      - name: Set up code signing profiles
        script: xcode-project use-profiles

      - name: Flutter build iOS release
        script: |
          flutter build ios \
            --release \
            --no-codesign \
            --build-name=$APP_VERSION \
            --build-number=$BUILD_NUMBER

      - name: Package and export IPA
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME" \
            --verbose

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false
      email:
        recipients:
          - mertsanverdi98@gmail.com
        notify:
          success: true
          failure: true
